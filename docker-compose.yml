services:
  postgres-identity-service:
    image: postgres:16-alpine
    container_name: postgres-identity-service
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata-identity-service:/var/lib/postgresql/data
    networks:
      - telcocrm-net

  postgres-customer-service:
    image: postgres:16-alpine
    container_name: postgres-customer-service
    environment:
