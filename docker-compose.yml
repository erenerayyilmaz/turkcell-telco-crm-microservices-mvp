  postgres-ticket-service:
    image: postgres:16-alpine
    container_name: postgres-ticket-service
    environment:
      POSTGRES_DB: ticket_db
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5442:5432"
    volumes:
      - pgdata-ticket-service:/var/lib/postgresql/data
    networks:
      - telcocrm-net
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: spring-pgadmin-telcom-crm
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5151:80"
    networks:
      - telcocrm-net

  # --- Event bus: Kafka (KRaft, tek node, zookeeper yok) ---
  kafka:
    image: apache/kafka:4.2.0
    container_name: telcocrm-kafka
    ports:
      - "9092:9092"          # host -> broker (EXTERNAL listener); cluster ici: kafka:19092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - telcocrm-net

  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: telcocrm-kafka-ui
    ports:
      # Host portu doluysa (8080 sik cakisan bir port) env ile ez:
      #   KAFKA_UI_PORT=8099 docker compose up -d kafka-ui
      - "${KAFKA_UI_PORT:-8080}:8080"          # http://localhost:8080 (veya KAFKA_UI_PORT)
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - telcocrm-net

  # --- Cache: Redis ---
  redis:
    image: redis:7-alpine
    container_name: telcocrm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - telcocrm-net

  # --- Identity Provider: Keycloak (dev mode, realm import) ---
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: telcocrm-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8095:8080"          # admin console http://localhost:8095 (admin/admin)
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import
    networks:
      - telcocrm-net

  # ====================================================================
  # OBSERVABILITY STACK  (LGTM + OpenTelemetry Collector)
  #   Uygulamalar HOST'ta calisir (mvnw spring-boot:run), altyapi Docker'da.
  #   traces : app --OTLP/HTTP:4318--> otel-collector --OTLP:4317--> tempo
  #   metrics: prometheus --scrape--> app:/actuator/prometheus (host.docker.internal)
  #   logs   : app --loki4j push:3100--> loki
  #   UI     : grafana (http://localhost:3000) -> Prometheus + Tempo + Loki
  # ====================================================================

  # --- Traces ingestion hub (sektorel desen: tek giris noktasi) ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    container_name: telcocrm-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./docker/otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"          # OTLP gRPC
      - "4318:4318"          # OTLP HTTP  (Spring uygulamalari buraya gonderir)
    depends_on:
      - tempo
    networks:
      - telcocrm-net

  # --- Traces backend ---
  tempo:
    image: grafana/tempo:2.7.1
    container_name: telcocrm-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    user: "0:0"
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"          # Tempo query API (Grafana datasource)
    networks:
      - telcocrm-net

  # --- Logs backend ---
  loki:
    image: grafana/loki:3.4.2
    container_name: telcocrm-loki
    command: ["-config.file=/etc/loki/loki.yaml"]
    user: "0:0"
    volumes:
      - ./docker/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"          # Loki push + query (loki4j buraya push eder)
    networks:
      - telcocrm-net

  # --- Metrics backend (host'taki Spring app'leri scrape eder) ---
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: telcocrm-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./docker/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux'ta da host'a erisim
    ports:
      - "9090:9090"
    networks:
      - telcocrm-net

  # --- Tek pencere: dashboards + Explore (trace<->log korelasyonu) ---
  grafana:
    image: grafana/grafana:11.5.1
    container_name: telcocrm-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"          # http://localhost:3000  (admin/admin)
    depends_on:
      - prometheus
      - tempo
      - loki
    networks:
      - telcocrm-net

networks:
  telcocrm-net:
    driver: bridge

volumes:
  kafka-data:
  redis-data:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:
  pgdata-identity-service:
  pgdata-customer-service:
  pgdata-product-catalog-service:
  pgdata-order-service:
  pgdata-subscription-service:
  pgdata-usage-service:
  pgdata-billing-service:
  pgdata-payment-service:
  pgdata-notification-service:
  pgdata-ticket-service:
