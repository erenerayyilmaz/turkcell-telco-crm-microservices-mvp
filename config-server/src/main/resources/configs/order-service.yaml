spring:
  datasource:
    url: jdbc:postgresql://localhost:5436/order_db
    username: ${DB_USER:order_user}
    password: ${DB_PASS:secret}
    driver-class-name: org.postgresql.Driver
  # --- Saga orchestrator: reply consumer (saga-replies) ---
  # Komutlar/domain event'leri outbox -> StreamBridge ile subscription-commands /
  # payment-commands / order-events topic'lerine DINAMIK gonderilir (output binding gerekmez).
  cloud:
    function:
      definition: sagaReplies
    stream:
      bindings:
        sagaReplies-in-0:
          destination: saga-replies
          group: order-service-group
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
