spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${BFF_CLIENT_ID:telco-bff}
            client-secret: ${BFF_CLIENT_SECRET:kVqT3nP9rL7wX2mB6dF4hJ8sZ1cY5gA}
            authorization-grant-type: authorization_code
            scope: openid, profile, email
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8095/realms/telco-crm}
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: gateway-proxy
              uri: lb://gateway-server
              predicates:
                # Yalniz downstream servis prefix'leri gateway'e forward edilir.
                # /api/me BFF-yereldir (MeController) ve BILINCLI olarak DISARIDA:
                # Path=/api/** olsaydi RouterFunction mapping'i @GetMapping'ten once
                # eslesir, /api/me'yi de gateway'e gonderirdi -> gateway 404 -> oturum
                # acikken FE'nin /api/me cagrisi kirilir (login tamamlanamaz).
                - Path=/api/auth/**,/api/identity/**,/api/customers/**,/api/catalog/**,/api/products/**,/api/orders/**,/api/subscriptions/**,/api/usage/**,/api/billing/**,/api/invoices/**,/api/payments/**,/api/notifications/**,/api/tickets/**
              filters:
                # Session'da tutulan access token'i Authorization: Bearer
                # header'i olarak gateway'e iletir.
                - TokenRelay
