spring:
  datasource:
    url: jdbc:postgresql://localhost:5441/notification_db
    username: ${DB_USER:notification_user}
    password: ${DB_PASS:secret}
    driver-class-name: org.postgresql.Driver
  # --- Tuketiciler: order-events (OrderConfirmed/OrderCancelled -> bildirim) +
  #     quota-events (QuotaThresholdReached -> %80/%100 esik SMS'i) +
  #     invoice-events (InvoiceGenerated/InvoicePaid/InvoicePaymentFailed -> EMAIL) +
  #     customer-events (CustomerKYCApproved -> hesap aktif SMS'i) +
  #     subscription-events (Suspended/Reactivated/Terminated -> hat durumu SMS'i) +
  #     ticket-events (TicketOpened -> "talebiniz alindi" SMS'i). Inbox idempotent.
  cloud:
    function:
      definition: consumeOrderEvents;consumeQuotaEvents;consumeInvoiceEvents;consumeCustomerEvents;consumeSubscriptionEvents;consumeTicketEvents
    stream:
      bindings:
        consumeOrderEvents-in-0:
          destination: order-events
          group: notification-service-group
        consumeQuotaEvents-in-0:
          destination: quota-events
          group: notification-service-group
        consumeInvoiceEvents-in-0:
          destination: invoice-events
          group: notification-service-group
        consumeCustomerEvents-in-0:
          destination: customer-events
          group: notification-service-group
        consumeSubscriptionEvents-in-0:
          destination: subscription-events
          group: notification-service-group
        consumeTicketEvents-in-0:
          destination: ticket-events
          group: notification-service-group
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
