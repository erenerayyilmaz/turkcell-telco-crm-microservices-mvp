spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # Tum servis konfigleri tek dizinde, dosya adi = spring.application.name.
          # <service>.yaml + <service>-<profile>.yaml + ortak application.yaml burada.
          search-locations: classpath:/configs

server:
  port: 8889

management:
  endpoints:
    web:
      exposure:
        include: health,info
